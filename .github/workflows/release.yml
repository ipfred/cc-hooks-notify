name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUT="cc-notify${{ matrix.ext }}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          go build \
            -ldflags "-s -w -X github.com/ipfred/cc-hooks-notify/internal/cli.version=${VERSION} -X github.com/ipfred/cc-hooks-notify/internal/cli.commit=${GITHUB_SHA} -X github.com/ipfred/cc-hooks-notify/internal/cli.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${OUT}" \
            ./cmd/cc-notify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-notify-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
